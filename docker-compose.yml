version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      # Override the spaCy model (default: en_core_web_lg)
      # - NLP_ENGINE_MODEL=en_core_web_sm
      # Override the default language (default: en)
      # - DEFAULT_LANGUAGE=en
      # Override the default score threshold (default: 0.5)
      # - DEFAULT_SCORE_THRESHOLD=0.5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # API_TARGET_URL is used ONLY by the Vite proxy (Node.js, server-side).
      # It is NOT exposed to the browser — the browser always calls /api/*
      # and the Vite dev server forwards those requests here.
      # 'api' is the Docker-internal hostname of the api service above.
      - API_TARGET_URL=http://api:8000
    depends_on:
      - api
